<main class="px-6 py-8 max-w-md mx-auto">

<div class="mb-10">

<div>
<span class="text-secondary font-bold tracking-widest text-xs uppercase block mb-1">Onboarding</span>

</div>
<div class="text-right">
<span class="text-primary font-bold text-lg">01</span>
<span class="text-outline text-sm">/ 03</span>
</div>
</div>
<div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-1/3 rounded-full glow-primary"></div>
</div>
</div>
<!-- Form Section -->
<div class="space-y-10">
<!-- Personal Info -->
<section>
<h3 class="text-sm font-bold text-outline-variant uppercase tracking-widest mb-6 flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary"></span>
                    Identity
                </h3>
<div class="glass-panel p-6 rounded-3xl space-y-5 border border-white/40">
<div class="relative">
<label class="text-[10px] font-bold text-primary uppercase tracking-wider absolute -top-2 left-4 px-1 bg-white">Full Name</label>
<input class="w-full bg-transparent border-outline/30 rounded-xl px-4 py-3.5 focus:ring-primary focus:border-primary text-on-surface font-medium placeholder:text-outline/50" placeholder="Alex Guardian" type="text"/>
</div>
<div class="relative">
<label class="text-[10px] font-bold text-primary uppercase tracking-wider absolute -top-2 left-4 px-1 bg-white">Email Address</label>
<input class="w-full bg-transparent border-outline/30 rounded-xl px-4 py-3.5 focus:ring-primary focus:border-primary text-on-surface font-medium placeholder:text-outline/50" placeholder="alex@ethereal.org" type="email"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="relative">
<label class="text-[10px] font-bold text-primary uppercase tracking-wider absolute -top-2 left-4 px-1 bg-white">Phone</label>
<input class="w-full bg-transparent border-outline/30 rounded-xl px-4 py-3.5 focus:ring-primary focus:border-primary text-on-surface font-medium placeholder:text-outline/50" placeholder="+1 234..." type="tel"/>
</div>
<div class="relative">
<label class="text-[10px] font-bold text-primary uppercase tracking-wider absolute -top-2 left-4 px-1 bg-white">DOB</label>
<input class="w-full bg-transparent border-outline/30 rounded-xl px-4 py-3.5 focus:ring-primary focus:border-primary text-on-surface font-medium placeholder:text-outline/50" placeholder="MM/DD/YYYY" type="text"/>
</div>
</div>
</div>
</section>

<h3 class="text-sm font-bold text-outline-variant uppercase tracking-widest mb-6 flex items-center gap-2">

                    Expertise
                </h3>

<span class="text-xs font-bold text-primary">Medical</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-2xl border-2 border-transparent glass-panel hover:border-primary/20 transition-all">
<span class="material-symbols-outlined text-outline mb-2">school</span>
<span class="text-xs font-bold text-on-surface">Teaching</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-2xl border-2 border-transparent glass-panel hover:border-primary/20 transition-all">
<span class="material-symbols-outlined text-outline mb-2">local_shipping</span>
<span class="text-xs font-bold text-on-surface">Logistics</span>
</button>

<span class="material-symbols-outlined text-outline mb-2">camera_enhance</span>
<span class="text-xs font-bold text-on-surface">Media</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-2xl border-2 border-transparent glass-panel hover:border-primary/20 transition-all">
<span class="material-symbols-outlined text-outline mb-2">emergency</span>
<span class="text-xs font-bold text-on-surface">Disaster Relief</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-2xl border-2 border-dashed border-outline-variant glass-panel opacity-60">
<span class="material-symbols-outlined text-outline mb-1 text-sm">add</span>
<span class="text-[10px] font-bold text-on-surface">Other</span>
</button>

<span class="w-2 h-2 rounded-full bg-tertiary"></span>

                </h3>
<div class="glass-panel p-6 rounded-3xl border border-white/40">
<div class="flex justify-between gap-1 mb-6 overflow-x-auto pb-2">
<button class="w-10 h-10 rounded-full flex items-center justify-center text-[10px] font-bold bg-primary text-white glow-primary shrink-0">M</button>
<button class="w-10 h-10 rounded-full flex items-center justify-center text-[10px] font-bold bg-surface-container-high text-on-surface-variant shrink-0">T</button>

<button class="w-10 h-10 rounded-full flex items-center justify-center text-[10px] font-bold bg-surface-container-high text-on-surface-variant shrink-0">T</button>
<button class="w-10 h-10 rounded-full flex items-center justify-center text-[10px] font-bold bg-primary text-white glow-primary shrink-0">F</button>
<button class="w-10 h-10 rounded-full flex items-center justify-center text-[10px] font-bold bg-surface-container-high text-on-surface-variant shrink-0">S</button>
<button class="w-10 h-10 rounded-full flex items-center justify-center text-[10px] font-bold bg-surface-container-high text-on-surface-variant shrink-0">S</button>
</div>
<div class="space-y-3">
<label class="flex items-center justify-between p-4 rounded-2xl bg-white/50 border border-white/20">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary">light_mode</span>
<span class="text-sm font-semibold">Morning</span>
</div>
<input checked="" class="rounded-full text-primary focus:ring-primary w-6 h-6 border-outline/30" type="checkbox"/>
</label>
<label class="flex items-center justify-between p-4 rounded-2xl bg-white/50 border border-white/20">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary">wb_sunny</span>
<span class="text-sm font-semibold">Afternoon</span>
</div>
<input class="rounded-full text-primary focus:ring-primary w-6 h-6 border-outline/30" type="checkbox"/>
</label>
<label class="flex items-center justify-between p-4 rounded-2xl bg-white/50 border border-white/20">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary">dark_mode</span>
<span class="text-sm font-semibold">Evening</span>
</div>
<input class="rounded-full text-primary focus:ring-primary w-6 h-6 border-outline/30" type="checkbox"/>
</label>
</div>
</div>
</section>
</div>

<button class="w-full py-4 rounded-2xl bg-gradient-to-r from-primary to-primary-container text-white font-bold tracking-wide glow-primary flex items-center justify-center gap-2 transform active:scale-[0.98] transition-all">
